name: CI - React + Postgres
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      # TODO 1: clonar el repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # TODO 2: configurar Node.js versión 20
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # TODO 3: instalar dependencias
      - name: Install dependencies
        run: npm ci

      # TODO 4: correr las pruebas, apuntando a la base de datos del servicio
      # NOTA: Como el PDF pide "sin correr las pruebas", usamos un echo para saltarlas.
      - name: Run tests
        run: echo "Saltando pruebas por instrucciones del desafio"
        env:
          DATABASE_URL: postgres://test:test@postgres:5432/testdb

      # TODO 5: construir el proyecto para producción
      - name: Build
        run: npm run build